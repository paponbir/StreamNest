version: '3.8'

services:
  db:
    image: postgres:15
    container_name: streamnest_db
    environment:
      POSTGRES_USER: streamnest
      POSTGRES_PASSWORD: streamnest_password
      POSTGRES_DB: streamnest_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
